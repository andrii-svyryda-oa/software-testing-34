services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loyalty
    ports: ['5432:5432']
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: Api/Dockerfile
    environment:
      ConnectionStrings__Default: 'Server=postgres;Port=5432;Database=loyalty;User Id=postgres;Password=postgres;'
      ASPNETCORE_URLS: 'http://+:5000'
      ASPNETCORE_ENVIRONMENT: Production
    ports: ['5000:5000']
    depends_on:
      postgres:
        condition: service_healthy
