name: Performance (k6)

on:
  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Start Postgres + API via docker compose
        working-directory: perf
        run: |
          docker compose -f docker-compose.perf.yml up -d --build postgres api
          # wait for the API to be ready
          for i in {1..60}; do
            if curl -fsS http://localhost:5000/swagger/v1/swagger.json >/dev/null 2>&1; then
              echo "API is up"
              break
            fi
            sleep 2
          done

      - name: Seed database
        run: |
          dotnet run --project Api -c Release -- --seed --output perf > perf/scarce-reward-id.txt
          test -s perf/scarce-reward-id.txt
          REWARD_ID=$(tr -d '\r\n ' < perf/scarce-reward-id.txt)
          echo "REWARD_ID=$REWARD_ID" >> "$GITHUB_ENV"
          echo "Scarce reward GUID: $REWARD_ID"

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: balance-load
        working-directory: perf
        env:
          API_URL: http://localhost:5000
          IDS_FILE: ./customer-ids.json
        run: k6 run --quiet --summary-export balance-load.json balance-load.js

      - name: redeem-stress
        working-directory: perf
        env:
          API_URL: http://localhost:5000
          RICH_IDS_FILE: ./rich-customer-ids.json
          REWARD_ID: ${{ env.REWARD_ID }}
        run: k6 run --quiet --summary-export redeem-stress.json redeem-stress.js

      - name: Upload k6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: perf/*.json

      - name: Tear down
        if: always()
        working-directory: perf
        run: docker compose -f docker-compose.perf.yml down -v
